services:
  - type: web
    name: andreani-tracker
    runtime: python
    repo: https://github.com/tu-usuario/andreani-tracker
    branch: main
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://andreani-tracker.onrender.com